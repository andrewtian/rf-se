<svg xmlns="http://www.w3.org/2000/svg" width="920" height="384" viewBox="0 0 920 384" role="img" aria-label="se299: IEEE-299 substitution shielding-effectiveness automation. Source and TX horn outside, analyzer and RX horn inside; SE(f) = reference(f) - wall(f). A computer drives each instrument: the outside controller, and the inside Pi reached over the fiber-optic link -- the only shield penetration, no copper through the shield.">
  <style>
    .panel   { fill: #ffffff; stroke: #d0d7de; }
    .primary { fill: #1f2328; }
    .second  { fill: #57606a; }
    .blue    { fill: #0969da; }
    .green   { fill: #1a7f37; }
    .amber   { fill: #9a6700; }
    .s-prim  { stroke: #1f2328; }
    .s-sec   { stroke: #57606a; }
    .s-blue  { stroke: #0969da; }
    .s-green { stroke: #1a7f37; }
    .s-amber { stroke: #9a6700; }
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }
  </style>
  <defs>
    <pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" class="s-sec" stroke-width="1.5" opacity="0.5"/>
    </pattern>
  </defs>

  <rect class="panel" x="1" y="1" width="918" height="382" rx="12" stroke-width="1.5"/>

  <!-- title + tagline -->
  <text class="primary" x="40" y="64" font-size="40" font-weight="700">se299</text>
  <text class="second" x="40" y="94" font-size="14">IEEE-299 substitution shielding-effectiveness automation -- Tier-1, real instruments</text>

  <!-- chips -->
  <rect x="644" y="36" width="104" height="26" rx="13" fill="none" class="s-blue" stroke-width="1.5"/>
  <text class="blue" x="696" y="53" font-size="12" text-anchor="middle">DC - 40 GHz</text>
  <rect x="768" y="36" width="112" height="26" rx="13" fill="none" class="s-green" stroke-width="1.5"/>
  <text class="green" x="824" y="53" font-size="12" text-anchor="middle">SE &gt;= 100 dB</text>

  <!-- formula -->
  <text class="primary" x="460" y="118" font-size="16" font-weight="700" text-anchor="middle">SE(f) = reference(f) - wall(f)</text>

  <!-- outside / inside -->
  <text class="second" x="40" y="142" font-size="10" font-weight="700" letter-spacing="3">OUTSIDE</text>
  <text class="second" x="880" y="142" font-size="10" font-weight="700" letter-spacing="3" text-anchor="end">INSIDE</text>

  <!-- shield wall -->
  <rect x="445" y="128" width="30" height="168" fill="url(#hatch)" class="s-sec" stroke-width="1.5"/>
  <rect x="451" y="192" width="18" height="72" class="panel" stroke="none"/>
  <text class="second" transform="rotate(-90 460 228)" x="460" y="232" font-size="10" text-anchor="middle">HMEMC wall</text>

  <!-- TX instrument -->
  <rect x="35" y="152" width="160" height="62" rx="8" fill="none" class="s-sec" stroke-width="1.5"/>
  <text class="primary" x="115" y="180" font-size="14" font-weight="700" text-anchor="middle">Anritsu 68369A</text>
  <text class="blue" x="115" y="200" font-size="11" text-anchor="middle">source (TX)</text>

  <!-- TX feed + horn -->
  <line x1="195" y1="183" x2="222" y2="183" class="s-prim" stroke-width="1.5"/>
  <polygon points="222,173 222,193 254,203 254,163" fill="none" class="s-prim" stroke-width="1.5"/>

  <!-- incident waves -->
  <path d="M262,169 a14,14 0 0 1 0,28" fill="none" class="s-blue" stroke-width="2"/>
  <path d="M274,159 a24,24 0 0 1 0,48" fill="none" class="s-blue" stroke-width="2" opacity="0.75"/>
  <path d="M286,149 a34,34 0 0 1 0,68" fill="none" class="s-blue" stroke-width="2" opacity="0.5"/>
  <text class="blue" x="372" y="150" font-size="12" text-anchor="middle">reference(f)</text>

  <!-- attenuated waves -->
  <path d="M505,169 a14,14 0 0 1 0,28" fill="none" class="s-blue" stroke-width="2" opacity="0.6" stroke-dasharray="3 4"/>
  <path d="M517,159 a24,24 0 0 1 0,48" fill="none" class="s-blue" stroke-width="2" opacity="0.4" stroke-dasharray="3 4"/>
  <path d="M529,149 a34,34 0 0 1 0,68" fill="none" class="s-blue" stroke-width="2" opacity="0.25" stroke-dasharray="3 4"/>
  <text class="amber" x="612" y="150" font-size="12" text-anchor="middle">wall(f)</text>

  <!-- RX horn + feed -->
  <polygon points="666,163 698,173 698,193 666,203" fill="none" class="s-prim" stroke-width="1.5"/>
  <line x1="698" y1="183" x2="725" y2="183" class="s-prim" stroke-width="1.5"/>

  <!-- RX instrument -->
  <rect x="725" y="152" width="160" height="62" rx="8" fill="none" class="s-sec" stroke-width="1.5"/>
  <text class="primary" x="805" y="180" font-size="14" font-weight="700" text-anchor="middle">HP 8565EC</text>
  <text class="green" x="805" y="200" font-size="11" text-anchor="middle">analyzer (RX)</text>

  <!-- controller computer (outside, drives TX) -->
  <line x1="115" y1="214" x2="115" y2="248" class="s-sec" stroke-width="1.5"/>
  <text class="second" x="123" y="236" font-size="10">GPIB</text>
  <rect x="75" y="248" width="80" height="40" rx="5" fill="none" class="s-sec" stroke-width="1.5"/>
  <text class="blue" x="115" y="272" font-size="10" text-anchor="middle">$ se299</text>
  <line x1="115" y1="288" x2="115" y2="296" class="s-sec" stroke-width="1.5"/>
  <line x1="97" y1="296" x2="133" y2="296" class="s-sec" stroke-width="1.5"/>
  <text class="primary" x="115" y="314" font-size="12" font-weight="700" text-anchor="middle">controller</text>
  <text class="second" x="115" y="330" font-size="11" text-anchor="middle">GPIB / net: bridge</text>

  <!-- fiber-optic analyzer link: the only shield penetration (PC3) -->
  <path d="M155,272 H765" fill="none" class="s-amber" stroke-width="2" stroke-dasharray="1 6" stroke-linecap="round"/>
  <circle cx="460" cy="272" r="6" class="panel" stroke-width="1.5"/>
  <circle cx="460" cy="272" r="6" fill="none" class="s-amber" stroke-width="1.5"/>
  <text class="amber" x="620" y="262" font-size="11" text-anchor="middle">fiber optic -- no copper through the shield</text>

  <!-- inside Pi computer (drives RX; fiber in, GPIB out) -->
  <line x1="805" y1="214" x2="805" y2="248" class="s-sec" stroke-width="1.5"/>
  <text class="second" x="813" y="236" font-size="10">GPIB</text>
  <rect x="765" y="248" width="80" height="40" rx="5" fill="none" class="s-amber" stroke-width="1.5"/>
  <text class="amber" x="805" y="272" font-size="10" text-anchor="middle">$ ni_gpib</text>
  <line x1="805" y1="288" x2="805" y2="296" class="s-amber" stroke-width="1.5"/>
  <line x1="787" y1="296" x2="823" y2="296" class="s-amber" stroke-width="1.5"/>
  <text class="primary" x="805" y="314" font-size="12" font-weight="700" text-anchor="middle">inside Pi</text>
  <text class="second" x="805" y="330" font-size="11" text-anchor="middle">GPIB-over-fiber (PC3)</text>

  <!-- bottom captions -->
  <text class="primary" x="460" y="356" font-size="12" font-weight="700" text-anchor="middle">no-cable substitution measurement -- nothing conductive crosses the shield</text>
  <text class="second" x="460" y="376" font-size="12" text-anchor="middle">every reading is logged over the digital bus -- never read off the instrument display</text>
</svg>
